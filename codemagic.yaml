workflows:
  ios-gestfina:
    name: GestFina iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_WORKSPACE: "Gestfina.xcworkspace"
        XCODE_SCHEME: "Gestfina"
        BUNDLE_ID: "com.madu.gestfina"
    scripts:
      - name: Install dependencies
        script: |
          pod install
      - name: Build iOS archive
        script: |
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Gestfina.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SUPPORTS_MACCATALYST=NO
      - name: Create IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Gestfina.xcarchive/Products/Applications/Gestfina.app build/Payload/
          cd build && zip -r Gestfina.ipa Payload
          echo "IPA created at build/Gestfina.ipa"
          ls -lh Gestfina.ipa
    artifacts:
      - build/*.ipa
    publishing:
      email:
        recipients:
          - madutech0@gmail.com
        notify:
          success: true
          failure: true
