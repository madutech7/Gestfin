workflows:
  ios-gestfina:
    name: GestFina iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "Gestfina.xcodeproj"
        XCODE_SCHEME: "Gestfina"
        BUNDLE_ID: "com.madu.gestfina"
    scripts:
      - name: Set up code signing (manual)
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - madu@email.com
        notify:
          success: true
          failure: true
